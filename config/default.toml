[storage]
backend = "memory"
fallback_strategy = "fail_close"

[storage.redis]
url = "redis://127.0.0.1:6379/
key_prefix = "rate-limit"

[rate_limit.default]
capacity = 100
refill_per_second = 10.0

[rate_limit.by_kind.user_id]
capacity = 50
refill_per_second = 5.0

# ip / api_key / custom fall back to default if omitted