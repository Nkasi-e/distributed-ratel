[storage]
backend = "memory"
fallback_strategy = "fail_close"

[storage.redis]
url = "redis://127.0.0.1:6379/"
key_prefix = "rate-limit"

[rate_limit.default.token_bucket]
capacity = 100
refill_per_second = 10.0

[rate_limit.by_kind.user_id.token_bucket]
capacity = 50
refill_per_second = 5.0

[rate_limit.by_kind.ip.sliding_window_counter]
window_secs = 60
max_cost_per_window = 120